# Production-scenario routing policy — used by examples/production_demo/.
#
# Defines per-tenant policies for a 3-tier SaaS: free / standard / enterprise.
# The benchmark.py harness sends the corresponding x-tenant-id and
# x-priority-tier headers; TokenFlow applies these policies, while the
# intent-based arm goes direct to backends and ignores tenants entirely.

name: production-saas
description: Multi-tenant SaaS routing — free/standard/enterprise tiers, mixed workload
preset: balanced

# Utility weights (sum to ~1.0)
slo_weight:           0.30
cost_weight:          0.20
queue_weight:         0.15
gpu_affinity_weight:  0.15
model_fit_weight:     0.10
reliability_weight:   0.10

# SLO targets
slo_ttft_ms:  500
slo_itl_ms:   50
slo_e2e_ms:   5000

# Hard limits
max_queue_depth: 100
min_health_score: 0.5
max_error_rate: 0.10

# DSL rules — evaluated in priority order
rules:
  - name: premium-traffic-on-premium-gpu
    description: "Enterprise tier ignores cost; route to premium GPU class"
    priority: 10
    conditions:
      priority_tier: "premium"
    actions:
      set_budget_sensitivity: 0.0

  - name: batch-to-economy-lane
    description: "Free / batch tier maximises cost savings"
    priority: 20
    conditions:
      priority_tier: "batch"
    actions:
      set_budget_sensitivity: 1.0

  - name: large-prompt-prefer-prefill
    description: "Long-context requests get TTFT-first routing"
    priority: 30
    conditions:
      input_tokens_gt: 4000
    actions:
      set_latency_class: "interactive"

  - name: complex-reasoning-on-frontier
    description: >
      Premium-tier reasoning workloads prefer the frontier API (OpenAI /
      Anthropic / OpenRouter) when one is registered. Local backends still
      handle chat / decode / prefill where they're cheaper.
    priority: 12
    conditions:
      priority_tier: "premium"
      workload_type: "reasoning"
    actions:
      set_budget_sensitivity: 0.05   # mostly ignore cost — quality matters

# Per-tenant policies. The router reads these on every request.
tenant_policies:
  tenant-free:
    allowed_gpu_classes: [L4, A10G, L40S, RTX4090]
    max_rpm: 30
    budget_usd_per_hour: 1.0
    priority_tier_override: batch
    cost_weight_override: 0.9

  tenant-standard:
    allowed_gpu_classes: [H100, A100, L40S, L4]
    max_rpm: 100
    budget_usd_per_hour: 10.0

  tenant-enterprise:
    allowed_gpu_classes: [B200, H200, H100, A100]
    max_rpm: 500
    budget_usd_per_hour: 100.0
    priority_tier_override: premium
